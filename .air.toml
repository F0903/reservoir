root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/reservoir-dev.exe ."
entrypoint = "./tmp/reservoir-dev.exe"
delay = 1000
exclude_dir = [
    ".git",
    ".github",
    ".zed",
    "build",
    "node_modules",
    "ssl",
    "tmp",
    "var",
    "vendor",
]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = true
follow_symlink = false
include_dir = [
    "cache",
    "config",
    "db",
    "logging",
    "metrics",
    "proxy",
    "utils",
    "version",
    "webserver/api",
    "webserver/auth",
    "webserver/dashboard/csp",
    "webserver/middleware",
    "webserver/streaming",
]
include_ext = ["go", "sql"]
include_file = ["go.mod", "go.sum", "main.go", "runtime.go"]
kill_delay = "500ms"
log = "build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = []
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
silent = false
time = false

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
